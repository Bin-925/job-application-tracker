spring:
  config:
    import: optional:application-secret.yml
  datasource:
    url: jdbc:h2:mem:jobtracker
    username: sa
    password:
  h2:
    console:
      enabled: true
  jpa:
    hibernate:
      ddl-auto: create
    show-sql: true
    properties:
      hibernate:
        format_sql: true

jwt:
  expiration-ms: 3600000