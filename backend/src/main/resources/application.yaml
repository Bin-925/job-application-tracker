spring:
  config:
    import: optional:application-secret.yml
  # 기본 프로파일 = 로컬 개발(MySQL)
  datasource:
    url: jdbc:mysql://localhost:3306/jobtracker?serverTimezone=Asia/Seoul&characterEncoding=UTF-8
    username: root
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
jwt:
  expiration-ms: 3600000